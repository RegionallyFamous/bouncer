name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  php:
    name: PHP ${{ matrix.php }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php:
          - '8.1'
          - '8.2'
          - '8.3'
          - '8.4'

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          coverage: none
          tools: composer:v2

      - name: Get Composer cache directory
        id: composer-cache
        run: echo "dir=$(composer config cache-files-dir)" >> "$GITHUB_OUTPUT"

      - name: Cache Composer dependencies
        uses: actions/cache@v5
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: ${{ runner.os }}-php-${{ matrix.php }}-composer-${{ hashFiles('**/composer.lock') }}
          restore-keys: |
            ${{ runner.os }}-php-${{ matrix.php }}-composer-
            ${{ runner.os }}-composer-

      - name: Validate composer.json
        run: composer validate --strict --no-check-publish

      - name: Install Composer dependencies
        run: composer install --prefer-dist --no-progress

      # Packagist advisories API sometimes returns 5xx; retry instead of failing the whole matrix.
      - name: Composer audit
        run: |
          for attempt in 1 2 3 4 5; do
            if composer audit; then
              exit 0
            fi
            echo "::warning::composer audit failed (attempt ${attempt}/5); retrying in 25s…"
            sleep 25
          done
          exit 1

      - name: Lint (syntax, PHPCS, PHP compatibility)
        run: composer run lint

  lint-js:
    name: ESLint (assets)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: npm

      - name: Install npm dependencies
        run: npm ci

      - name: ESLint
        run: npm run lint:js

      - name: npm audit
        run: npm audit
